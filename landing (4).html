<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Landing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#bg{
  position:fixed;inset:0;
  background-image:url('https://raw.githubusercontent.com/vladislavkononovich966/Music/386f8949229f13607aeddc90c9301210ba188e0e/%D0%AD%D0%BA%D1%80%D0%B0%D0%BD%201%20%D0%BA%D0%BE%D0%BF%D0%B8%D1%8F.jpg');
  background-size:cover;
  background-position:center top;
  z-index:0;
}
#lottie{
  position:fixed;inset:0;
  z-index:1;
  pointer-events:none;
}
#lottie svg{width:100%!important;height:100%!important}
</style>
</head>
<body>
<div id="bg"></div>
<div id="lottie"></div>
<script>
lottie.loadAnimation({
  container: document.getElementById('lottie'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  path: 'https://raw.githubusercontent.com/vladislavkononovich966/Music/5240f7e18054ab60588c29c301135e6de7aa5acf/data.json'
});
</script>
</body>
</html>
